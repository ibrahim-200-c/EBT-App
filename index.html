<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBT Download Center</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #071022;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #1e293b;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 1px solid #334155;
        }
        /* Style for App Logo */
        .app-logo {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            object-fit: cover;
        }
        h1 {
            color:#ffffff ;
            margin-bottom: 10px;
        }
        p {
            color: #ffffff;
            margin-bottom: 30px;
        }
        .download-btn {
            background-color:#22c55e ;
            color: #0f172a;
            padding: 18px 40px;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            border-radius: 12px;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .download-btn:hover {
            background-color: #22c55e;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(94, 253, 8, 0.977);
        }
    </style>
</head>
<body>

<div class="card">
    <img src="logo.jpg" alt="App logo" class="app-logo">
    <h1>Official EBT App</h1>
    <p>Click the button below to start the direct download.</p>
    
    <a href="EBTv2.apk" class="download-btn" download>Download Now</a>
</div>

</body>
</html>
